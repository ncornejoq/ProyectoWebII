<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Deep Down - Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="cave-guideline"></div>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo2.webp" alt="" height="40px" style="border-radius: 5cap;"> DEEP<span>DOWN</span>
      </a>
      <button class="navbar-toggler border-0 text-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <i class="fa-solid fa-bars-staggered" style="color: #00d2f2; font-size: 1.5rem;"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" id="link-index" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" id="link-nosotros" href="nosotros.html">Ciencia</a></li>
          <li class="nav-item"><a class="nav-link" id="link-servicios" href="servicios.html">Cuevas</a></li>
          <li class="nav-item"><a class="nav-link" id="link-galeria" href="galeria.html">Galeria</a></li>
          <li class="nav-item"><a class="nav-link" id="link-contacto" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="bg-navy p-4 rounded border border-secondary">
          <h2 class="text-cyan text-center mb-4">Registro de Aspirantes a Expedición</h2>
          <form id="expeditionForm" novalidate>
            <div class="mb-3">
              <label class="form-label" >Nombre Completo (Mínimo 3 letras)</label>
              <input type="text" class="form-control" id="inputName" required>
              <div class="invalid-feedback">Nombre inválido.</div>
            </div>
            <div class="mb-3">
              <label class="form-label ">Correo Electrónico</label>
              <input type="email" class="form-control" id="inputEmail" required>
              <div class="invalid-feedback">Formato de correo incorrecto.</div>
            </div>
            <div class="mb-3">
              <label class="form-label ">Inmersiones Registradas (Mínimo requerido: 50)</label>
              <input type="number" class="form-control" id="inputDives" required>
              <div class="invalid-feedback">Debe tener al menos 50 inmersiones.</div>
            </div>
            <button type="submit" class="btn btn-orange w-100 py-2">Enviar Solicitud</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
