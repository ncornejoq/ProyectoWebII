<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Down - Cuevas visitadas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="cave-guideline"></div>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo2.webp" alt="" height="40px" style="border-radius: 5cap;"> DEEP<span>DOWN</span>
      </a>
      <button class="navbar-toggler border-0 text-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <i class="fa-solid fa-bars-staggered" style="color: #00d2f2; font-size: 1.5rem;"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" id="link-index" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" id="link-nosotros" href="nosotros.html">Ciencia</a></li>
          <li class="nav-item"><a class="nav-link" id="link-servicios" href="servicios.html">Cuevas</a></li>
          <li class="nav-item"><a class="nav-link" id="link-galeria" href="galeria.html">Galeria</a></li>
          <li class="nav-item"><a class="nav-link" id="link-contacto" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row mb-4 align-items-center g-3">
      <div class="col-md-6 col-12 text-center text-md-start">
        <h1 class="text-cyan">Catálogo de Sistemas de Cuevas</h1>
      </div>
      <div class="col-md-6 col-12 d-flex gap-2 justify-content-center justify-content-md-end">
        <input type="text" id="tableSearch" class="form-control w-50" placeholder="Buscar cueva...">
        <button class="btn btn-orange" data-bs-toggle="modal" data-bs-target="#addCaveModal">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
    </div>

    <div class="table-container table-responsive">
      <table class="table custom-table mb-0">
        <thead>
          <tr>
            <th>Cueva</th>
            <th>Ubicación</th>
            <th>Profundidad</th>
            <th>Riesgo</th>
            <th>Registro</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="cavesTableBody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal fade" id="addCaveModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Añadir Registro Exploratorio</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addCaveForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="caveName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Ubicación</label>
              <input type="text" class="form-control" id="caveLocation" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Profundidad (m)</label>
              <input type="number" class="form-control" id="caveDepth" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Riesgo</label>
              <select class="form-select" id="caveRisk" required>
                <option value="Explorado">Explorado</option>
                <option value="Exploración Activa">Exploración Activa</option>
                <option value="Extremo / Restringido">Extremo / Restringido</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Fecha</label>
              <input type="date" class="form-control" id="caveDate" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cyan" onclick="submitNewCave()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
